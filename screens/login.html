<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | AETHON</title>
    
    <meta name="description" content="Accede a tu cuenta AETHON.">
    
    <link rel="stylesheet" href="../css/utils.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

    <main class="login-layout">
        
        <div class="login-background">
            <img src="../img/login.png" alt="AETHON Editorial Headquarters" class="login-background__img">
            <div class="login-background__overlay"></div>
        </div>

        <div class="login-panel">
            <div class="login-panel__content">
                
                <a href="../index.html" class="btn-back" aria-label="Volver a la tienda">
                    <span class="icon">&larr;</span> VOLVER A LA TIENDA
                </a>

                <div class="login-brand">
                    <h1 class="login-brand__logo">AETHON</h1>
                    <p class="login-brand__subtitle">HEADQUARTERS</p>
                </div>

                <div class="login-header">
                    <h2>INICIAR SESIÓN</h2>
                    <p>Introduce tus credenciales para acceder al sindicato.</p>
                </div>

                <div id="login-error" class="message-box message-box--error hidden">
                    <p>Credenciales incorrectas. Por favor, inténtalo de nuevo.</p>
                </div>
                
                <div id="login-success" class="message-box message-box--success hidden">
                    <p>Acceso concedido. Redirigiendo...</p>
                </div>

                <form id="auth-form" class="auth-form">
                    
                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" name="email" class="input-dark" value="admin@mail.com" placeholder="tu@email.com" required>
                    </div>

                    <div class="form-group">
                        <div class="label-with-link">
                            <label for="password">Contraseña</label>
                            <a href="#" class="forgot-password-link">¿Olvidaste tu contraseña?</a>
                        </div>
                        <input type="password" id="password" name="password" class="input-dark" value="123456" placeholder="••••••••" required>
                    </div>

                    <div class="form-actions">
                        <button type="submit" id="btn-login" class="btn btn--primary btn--full-width">
                            ENTRAR
                        </button>
                    </div>

                </form>

                <div class="login-footer">
                    <p>¿No tienes una cuenta? <a href="#" class="register-link">Solicitar acceso</a></p>
                </div>

            </div>
        </div>

    </main>

    <script src="../js/storage.js"></script>
    <script type="module" src="../js/auth.js"></script>
    <script src="../js/app.js"></script>
    
</body>
</html>
