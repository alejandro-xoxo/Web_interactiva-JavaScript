<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHON | System Access</title>
    <link rel="stylesheet" href="../css/utils.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

    <main>

        <section>

            <h1>AETHON [ SECURE ACCESS ]</h1>

            <form id="login-form">

                <label for="email">ID Operativo (Correo)</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="ej. admin@aethon.com"
                >

                <label for="password">Clave de Acceso</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="••••••••••••"
                >

                <button type="submit" id="login-btn">
                    INICIAR SESIÓN [ ENTER ]
                </button>

            </form>

            <p id="login-message"></p>

        </section>

    </main>

</body>
</html>
