<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorías</title>
</head>
<body>

    <main>

        <aside>

            <h2>Panel Admin</h2>

            <nav>
                <a href="./dashboard.html">Dashboard</a>
                <a href="./categories.html">Categorías</a>
                <a href="./products.html">Productos</a>
                <a href="./orders.html">Pedidos</a>
                <a href="./login.html">Cerrar sesión</a>
            </nav>

        </aside>

        <section>

            <header>

                <h1>Categorías</h1>

                <button id="btn-agregar-categoria">
                    Agregar categoría
                </button>

            </header>

            <table>

                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody id="lista-categorias">

                </tbody>

            </table>

            <dialog id="modal-categoria">

                <form id="form-categoria">

                    <h2>Nueva Categoría</h2>

                    <label for="nombre-categoria">
                        Nombre
                    </label>

                    <input
                        type="text"
                        id="nombre-categoria"
                        name="nombre-categoria"
                    >

                    <label for="descripcion-categoria">
                        Descripción
                    </label>

                    <textarea
                        id="descripcion-categoria"
                        name="descripcion-categoria"
                    ></textarea>

                    <button type="submit">
                        Guardar
                    </button>

                </form>

            </dialog>

        </section>

    </main>

</body>
</html>
