<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos</title>
</head>
<body>

    <main>

        <aside>

            <h2>Panel Admin</h2>

            <nav>
                <a href="./dashboard.html">Dashboard</a>
                <a href="./categories.html">Categorías</a>
                <a href="./products.html">Productos</a>
                <a href="./orders.html">Pedidos</a>
                <a href="./login.html" id="link-logout">Cerrar sesión</a> </nav>

        </aside>

        <section>

            <header>

                <h1>Productos</h1>

                <button id="btn-agregar-producto">
                    Agregar producto
                </button>

            </header>

            <table id="table-productos"> <thead>
                    <tr>
                        <th>Código</th>
                        <th>Nombre</th>
                        <th>Categoría</th>
                        <th>Precio</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody id="lista-productos">

                </tbody>

            </table>

            <dialog id="modal-producto">

                <form id="form-producto">

                    <h2>Nuevo Producto</h2>

                    <label for="codigo-producto">
                        Código
                    </label>

                    <input
                        type="text"
                        id="codigo-producto"
                        name="codigo-producto"
                    >

                    <label for="nombre-producto">
                        Nombre
                    </label>

                    <input
                        type="text"
                        id="nombre-producto"
                        name="nombre-producto"
                    >

                    <label for="categoria-producto">
                        Categoría
                    </label>

                    <select
                        id="categoria-producto"
                        name="categoria-producto"
                    >
                    </select>

                    <label for="precio-producto">
                        Precio
                    </label>

                    <input
                        type="number"
                        id="precio-producto"
                        name="precio-producto"
                    >

                    <label for="imagen-producto">
                        URL Imagen
                    </label>

                    <input
                        type="url"
                        id="imagen-producto"
                        name="imagen-producto"
                    >

                    <label for="descripcion-producto">
                        Descripción
                    </label>

                    <textarea
                        id="descripcion-producto"
                        name="descripcion-producto"
                    ></textarea>

                    <button type="submit" id="btn-guardar-producto"> Guardar Producto
                    </button>

                </form>

            </dialog>

        </section>

    </main>

</body>
</html>
