<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHON | The New Blueprint</title>
</head>
<body>

    <header>

        <h1>AETHON</h1>

        <button id="btn-carrito">
            BOLSA (0)
        </button>

    </header>

    <main>

        <section id="section-busqueda"> <h2>Explorar la Red</h2>

            <input
                type="search"
                id="buscar-producto"
                placeholder="Buscar por referencia, lote o línea de diseño..."
            >

        </section>

        <section id="section-categorias"> <h2>Coordenadas (Líneas)</h2>

            <div id="filtros-categorias">
                </div>

        </section>

        <section id="section-productos"> <h2>Catálogo [ V1.0 ]</h2>

            <div id="contenedor-productos">
                </div>

        </section>

    </main>

    <dialog id="modal-carrito">

        <section>

            <h2>Bolsa de Compra</h2>

            <div id="productos-carrito">
                </div>

            <p id="total-compra">
                Subtotal: $0.00
            </p>

            <button id="btn-comprar">
                PROCESAR CHECKOUT
            </button>

            <button id="btn-cerrar-carrito">
                CONTINUAR EXPLORANDO
            </button>

        </section>

    </dialog>

</body>
</html>
