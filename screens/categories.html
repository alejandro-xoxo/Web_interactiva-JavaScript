<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorías</title>
    <link rel="stylesheet" href="../css/utils.css">
    <link rel="stylesheet" href="../css/categories.css">
</head>
<body>

    <main class="admin-layout">

        <aside class="sidebar">

            <h2 class="sidebar-title">Panel Admin</h2>

            <nav class="sidebar-nav">
                <a href="./dashboard.html" class="nav-link">Dashboard</a>
                <a href="./categories.html" class="nav-link nav-link-active">Categorías</a>
                <a href="./products.html" class="nav-link">Productos</a>
                <a href="./orders.html" class="nav-link">Pedidos</a>
                <a href="./login.html" class="nav-link logout" id="link-logout">Cerrar sesión</a> </nav>

        </aside>

        <section class="content-container categories-wrapper">

            <header class="page-header">
                <div>
                    <h1 class="section-title">Categorías</h1>
                    <p class="section-subtitle">Administra las categorías de productos</p>
                </div>

                <button id="btn-agregar-categoria" class="btn btn-primary">
                    Agregar categoría
                </button>
            </header>

            <div class="card table-responsive">
                <table class="table" id="table-categorias"> <thead>
                        <tr>
                            <th class="table-header">Nombre</th>
                            <th class="table-header">Descripción</th>
                            <th class="table-header">Acciones</th>
                        </tr>
                    </thead>

                    <tbody id="lista-categorias">
                        </tbody>

                </table>
            </div>

            <dialog id="modal-categoria" class="modal">

                <form id="form-categoria" class="modal-form">

                    <h2 class="section-title">Nueva Categoría</h2>

                    <div class="form-group">
                        <label for="nombre-categoria" class="form-label">
                            Nombre
                        </label>
                        <input
                            type="text"
                            id="nombre-categoria"
                            name="nombre-categoria"
                            class="input"
                        >
                    </div>

                    <div class="form-group">
                        <label for="descripcion-categoria" class="form-label">
                            Descripción
                        </label>
                        <textarea
                            id="descripcion-categoria"
                            name="descripcion-categoria"
                            class="textarea"
                        ></textarea>
                    </div>

                    <div class="modal-footer">
                        <button type="submit" class="btn btn-primary" id="btn-guardar-categoria"> Guardar
                        </button>
                    </div>

                </form>

            </dialog>

        </section>

    </main>

</body>
</html>
