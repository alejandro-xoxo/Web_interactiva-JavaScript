<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHON | Staff Access</title>
    <link rel="stylesheet" href="../css/utils.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body class="login-body">

    <main class="login-container">

        <section class="login-card">

            <div class="login-header">
                <a href="../index.html" style="text-decoration: none; color: inherit;"><h1 class="brand-logo">AETHON</h1></a>
                <h2>STUDIO ACCESS</h2>
                <p>Authorized personnel only. Enter credentials to manage drops and collections.</p>
            </div>

            <form id="login-form" class="auth-form" action="./dashboard.html" method="GET">

                <div class="form-group">
                    <label for="email">Staff Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        class="input"
                        placeholder="ej. admin@aethonwear.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="input"
                        placeholder="••••••••••••"
                        required
                    >
                </div>

                <button type="submit" id="login-btn" class="btn-primary login-submit">
                    ENTER STUDIO
                </button>

            </form>

            <div class="login-footer">
                <a href="#" id="forgot-password-link" class="forgot-password">Lost access? Contact IT.</a>
                <p id="login-message" class="auth-message"></p>
                <div style="margin-top: 1.5rem; text-align: center;">
                    <a href="../index.html" style="color: var(--color-muted); text-decoration: underline; font-size: 0.85rem;">Return to Public Store</a>
                </div>
            </div>

        </section>

    </main>

</body>
</html>
