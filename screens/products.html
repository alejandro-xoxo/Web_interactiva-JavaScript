<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHON | Inventario</title>
</head>
<body>

    <main>

        <aside>

            <h2>AETHON [ CORE ]</h2>

            <nav>
                <a href="./dashboard.html">Control Center</a>
                <a href="./categories.html">Líneas de Diseño</a>
                <a href="./products.html">Catálogo (SKUs)</a>
                <a href="./orders.html">Operaciones</a>
                <a href="./login.html" id="link-logout">Desconectar</a> </nav>

        </aside>

        <section>

            <header>

                <h1>Catálogo Maestro</h1>

                <button id="btn-agregar-producto">
                    REGISTRAR PIEZA [ + ]
                </button>

            </header>

            <table id="table-productos"> <thead>
                    <tr>
                        <th>Lote (SKU)</th>
                        <th>Denominación de la Pieza</th>
                        <th>Línea</th>
                        <th>Valor (COP)</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody id="lista-productos">

                </tbody>

            </table>

            <dialog id="modal-producto">

                <form id="form-producto">

                    <h2>Nueva Pieza al Blueprint</h2>

                    <label for="codigo-producto">
                        Código de Lote (SKU)
                    </label>

                    <input
                        type="text"
                        id="codigo-producto"
                        name="codigo-producto"
                        placeholder="ej. AE-CORE-001"
                    >

                    <label for="nombre-producto">
                        Denominación
                    </label>

                    <input
                        type="text"
                        id="nombre-producto"
                        name="nombre-producto"
                        placeholder="Nombre exacto de la prenda"
                    >

                    <label for="categoria-producto">
                        Línea de Diseño
                    </label>

                    <select
                        id="categoria-producto"
                        name="categoria-producto"
                    >
                    </select>

                    <label for="precio-producto">
                        Valor Unitario
                    </label>

                    <input
                        type="number"
                        id="precio-producto"
                        name="precio-producto"
                        placeholder="0.00"
                    >

                    <label for="imagen-producto">
                        Asset Visual (URL)
                    </label>

                    <input
                        type="url"
                        id="imagen-producto"
                        name="imagen-producto"
                        placeholder="https://..."
                    >

                    <label for="descripcion-producto">
                        Especificaciones Técnicas / GSM
                    </label>

                    <textarea
                        id="descripcion-producto"
                        name="descripcion-producto"
                        placeholder="Detalles de tejido, fit, herrajes..."
                    ></textarea>

                    <button type="submit" id="btn-guardar-producto"> PUBLICAR PIEZA
                    </button>

                </form>

            </dialog>

        </section>

    </main>

</body>
</html>
