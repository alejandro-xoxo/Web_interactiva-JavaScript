<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHON | Líneas de Diseño</title>
    <link rel="stylesheet" href="../css/utils.css">
    <link rel="stylesheet" href="../css/categories.css">
</head>
<body>

    <main class="admin-layout">

        <aside class="sidebar">

            <h2 class="sidebar-title">AETHON [ CORE ]</h2>

            <nav class="sidebar-nav">
                <a href="./dashboard.html" class="nav-link">Control Center</a>
                <a href="./categories.html" class="nav-link nav-link-active">Líneas de Diseño</a>
                <a href="./products.html" class="nav-link">Catálogo (SKUs)</a>
                <a href="./orders.html" class="nav-link">Operaciones</a>
                <a href="./login.html" class="nav-link logout" id="link-logout">Desconectar</a> </nav>

        </aside>

        <section class="content-container categories-wrapper">

            <header class="page-header">
                <div>
                    <h1 class="section-title">Líneas de Diseño</h1>
                    <p class="section-subtitle">Gestión estructurada de colecciones y directrices de marca.</p>
                </div>

                <button id="btn-agregar-categoria" class="btn btn-primary">
                    NUEVA LÍNEA [ + ]
                </button>
            </header>

            <div class="card table-responsive">
                <table class="table" id="table-categorias"> <thead>
                        <tr>
                            <th class="table-header">Nomenclatura</th>
                            <th class="table-header">Concepto / Detalles</th>
                            <th class="table-header">Acciones</th>
                        </tr>
                    </thead>

                    <tbody id="lista-categorias">
                        </tbody>

                </table>
            </div>

            <dialog id="modal-categoria" class="modal">

                <form id="form-categoria" class="modal-form">

                    <h2 class="section-title">Añadir Línea de Diseño</h2>

                    <div class="form-group">
                        <label for="nombre-categoria" class="form-label">
                            Nomenclatura (Nombre)
                        </label>
                        <input
                            type="text"
                            id="nombre-categoria"
                            name="nombre-categoria"
                            class="input"
                            placeholder="ej. CORE, OUTERWEAR..."
                        >
                    </div>

                    <div class="form-group">
                        <label for="descripcion-categoria" class="form-label">
                            Concepto
                        </label>
                        <textarea
                            id="descripcion-categoria"
                            name="descripcion-categoria"
                            class="textarea"
                            placeholder="Especificaciones de la colección..."
                        ></textarea>
                    </div>

                    <div class="modal-footer">
                        <button type="submit" class="btn btn-primary" id="btn-guardar-categoria"> REGISTRAR LÍNEA
                        </button>
                    </div>

                </form>

            </dialog>

        </section>

    </main>

</body>
</html>
